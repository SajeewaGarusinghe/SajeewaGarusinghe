      font-size: 11px;
      fill: #00ff41;
    }
    tspan {
      opacity: 0;
      animation: reveal 0.35s ease-out forwards;
    }
    @keyframes reveal {
      from { opacity: 0; }
      to   { opacity: 0.92; }
    }
    .cursor {
      fill: #00ff41;
      animation: blink 1s step-end infinite 1.845s;
    }
    @keyframes blink {
      50% { opacity: 0; }
    }
    @media (prefers-reduced-motion: reduce) {
      tspan { opacity: 0.92; animation: none; }
      .cursor { animation: none; }
    }
